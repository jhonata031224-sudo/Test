<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background-color: #0b0e14; color: white; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 100px; }
        * { font-style: normal !important; }
        .glass-card { background: #11171f; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .border-ps5 { border-left: 6px solid #ffbf00; }
        .border-ps4 { border-left: 6px solid #5e20f0; }
        .border-ps3 { border-left: 6px solid #c0c0c0c2; }
        .btn-action { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); }
        .notif-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
        .timer-warning { color: #f59e0b !important; }
        .timer-danger  { color: #ef4444 !important; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .tab-btn { padding: 8px 18px; border-radius: 20px; font-size: 11px; font-weight: 800; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .tab-active { background: #00d9ff; color: #000; border-color: #00d9ff; }
        .tab-inactive { color: #9ca3af; background: rgba(255,255,255,0.03); }
        .req-card { background: #11171f; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 18px; margin-bottom: 14px; animation: slideIn 0.3s ease-out; }
        .req-card.booking-req { border-left: 4px solid #00d9ff; }
        .req-card.rental-req  { border-left: 4px solid #a855f7; }
        .badge-pending { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); border-radius: 6px; padding: 2px 8px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .badge-booking { background: rgba(0,217,255,0.1); color: #00d9ff; border: 1px solid rgba(0,217,255,0.25); border-radius: 6px; padding: 2px 8px; font-size: 9px; font-weight: 800; }
        .badge-rental  { background: rgba(168,85,247,0.1); color: #a855f7; border: 1px solid rgba(168,85,247,0.25); border-radius: 6px; padding: 2px 8px; font-size: 9px; font-weight: 800; }
        .btn-approve { background: #10b981; color: #fff; border: none; border-radius: 10px; padding: 9px 18px; font-size: 11px; font-weight: 800; cursor: pointer; font-family: inherit; transition: 0.15s; }
        .btn-approve:hover { filter: brightness(1.15); }
        .btn-reject  { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 9px 18px; font-size: 11px; font-weight: 800; cursor: pointer; font-family: inherit; transition: 0.15s; }
        .btn-reject:hover { background: rgba(239,68,68,0.25); }
        .req-notif-dot { display:none; position:absolute; top:6px; right:6px; width:8px; height:8px; background:#f59e0b; border-radius:50%; }
        .req-notif-dot.show { display:block; animation: pulse-red 1s infinite; }
        #req-panel { display: none; }
        #req-panel.show { display: block; }

        .income-toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            background:linear-gradient(135deg,#065f46,#047857);
            border:1px solid #10b981; border-radius:12px;
            padding:10px 20px; font-size:12px; font-weight:700;
            color:#6ee7b7; z-index:9999; animation:slideDown 0.4s ease; white-space:nowrap;
        }
        @keyframes slideDown { from{opacity:0;top:-20px} to{opacity:1;top:20px} }
        .btn-logout-staff { display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; background:rgba(247,129,102,0.08); border:1px solid rgba(247,129,102,0.2); color:#f78166; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
        .btn-logout-staff:hover { background:rgba(247,129,102,0.18); }
    </style>
</head>
<body class="p-4">

<header class="flex justify-between items-center mb-6 px-2">
    <div>
        <h1 class="text-2xl font-black tracking-tighter text-cyan-400">Operation</h1>
        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Live Monitoring Unit</p>
    </div>
    <div class="flex items-center gap-3">
        <button onclick="toggleNotif()" class="w-12 h-12 glass-card flex items-center justify-center text-gray-400 relative">
            <i class="fas fa-bell"></i>
            <span id="notif-dot" class="hidden absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <button class="btn-logout-staff" onclick="doLogout()">
            <i class="fas fa-right-from-bracket"></i>
            <span>Logout</span>
        </button>
    </div>
</header>

<!-- TAB SWITCHER -->
<div class="flex gap-2 mb-6 px-2">
    <button id="tab-unit" onclick="switchTab('unit')" class="tab-btn tab-active">
        <i class="fas fa-th-large mr-1"></i> Unit
    </button>
    <button id="tab-req" onclick="switchTab('req')" class="tab-btn tab-inactive relative">
        <i class="fas fa-clock mr-1"></i> Permintaan
        <span id="req-notif-dot" class="req-notif-dot"></span>
    </button>
</div>

<!-- PANEL PERMINTAAN KONFIRMASI -->
<div id="req-panel">
    <div id="req-list" class="space-y-0 mb-20">
        <div class="text-center py-12 text-gray-600">
            <i class="fas fa-spinner fa-spin text-cyan-400 text-2xl mb-3 block"></i>
            Memuat permintaan...
        </div>
    </div>
</div>

<div id="notif-panel" class="hidden fixed top-20 right-4 left-4 z-[100] glass-card p-5 shadow-2xl border-cyan-400/20 max-h-[400px] overflow-y-auto">
    <div class="flex justify-between items-center mb-4 pb-2 border-b border-white/5">
        <h3 class="text-xs font-black uppercase tracking-widest">Aktivitas Terbaru</h3>
        <button onclick="hapusSemuaNotif()" class="text-[10px] font-bold text-red-500 uppercase">Hapus Semua</button>
    </div>
    <div id="notif-list" class="space-y-3 text-[11px]"></div>
</div>

<div id="unit-grid" class="grid grid-cols-1 gap-4 mb-20">
    <p class="text-center text-gray-500 py-10">Mengkoneksikan ke server...</p>
</div>

<div class="fixed bottom-0 left-0 right-0 glass-card !rounded-t-3xl !rounded-b-none border-t border-white/10 p-4 flex justify-around items-center z-50">
    <div class="flex flex-col items-center text-cyan-400">
        <i class="fas fa-th-large text-lg"></i>
        <span class="text-[9px] font-bold uppercase mt-1">Beranda</span>
    </div>
    <div onclick="location.href='history-staff.html'" class="flex flex-col items-center text-gray-500 cursor-pointer">
        <i class="fas fa-history text-lg"></i>
        <span class="text-[9px] font-bold uppercase mt-1">Riwayat</span>
    </div>
</div>

<script type="module">
    import { db, onSnapshot, collection, doc, updateDoc, addDoc, handleLogout } from './auth.js';
    import { query, where, orderBy, getDocs, getDoc, serverTimestamp }
        from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getAuth, onAuthStateChanged }
        from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const auth = getAuth();
    let staffNama = 'Staff';

    let historyNotif = [];
    let currentUnits = [];
    const autoStopped = new Set();
    let timerInterval = null;

    // ── Auth: cek login staff ──────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'login-staff.html'; return; }
        try {
            const sDoc = await getDoc(doc(db, 'staff', user.uid));
            if (sDoc.exists() && sDoc.data().nama) staffNama = sDoc.data().nama;
            else staffNama = user.email.split('@')[0];
        } catch(e) { staffNama = user.email ? user.email.split('@')[0] : 'Staff'; }
    });

    // ── ISO Week ──────────────────────────────────────────────────────
    function getISOWeek(date) {
        const d = new Date(date);
        d.setHours(0,0,0,0);
        d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
        const w1 = new Date(d.getFullYear(), 0, 4);
        const wn = 1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
        return `${d.getFullYear()}-W${String(wn).padStart(2,'0')}`;
    }

    // ── Simpan pendapatan ke Firestore ────────────────────────────────
    async function simpanPendapatan(unit, alasan) {
        const now     = new Date();
        const tanggal = now.toISOString().slice(0, 10);
        const minggu  = getISOWeek(now);
        const bulan   = now.toISOString().slice(0, 7);

        await addDoc(collection(db, 'pendapatan'), {
            unitId:       unit.id,
            unitType:     unit.type || '-',
            customerName: unit.customerName || 'Walk-in',
            price:        unit.price || 0,
            startTime:    unit.startTime || '-',
            stopTime:     now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' }),
            alasan,
            tanggal,
            minggu,
            bulan,
            createdAt:    serverTimestamp()
        });

        showIncomeToast(unit.id, unit.price || 0);
        tambahNotif(`\uD83D\uDCB0 Pendapatan Masuk: ${unit.id} \u2014 Rp ${(unit.price||0).toLocaleString()} (${alasan})`);
    }

    // ── Reset unit ────────────────────────────────────────────────────
    async function resetUnit(id) {
        await updateDoc(doc(db, 'units', id), {
            status: 'Tersedia', startTime: '-', endTime: null, price: 0, customerName: '-'
        });
    }

    // ── Toast ─────────────────────────────────────────────────────────
    function showIncomeToast(unitId, amount) {
        const el = document.createElement('div');
        el.className = 'income-toast';
        el.innerHTML = `<i class="fas fa-circle-check mr-2"></i>Pendapatan Masuk \u00B7 ${unitId} \u00B7 Rp ${amount.toLocaleString('id-ID')}`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
    }

    // ── Format timer ──────────────────────────────────────────────────
    function formatSisa(endTime) {
        const d = endTime - Date.now();
        if (d <= 0) return { text: 'SELESAI', cls: 'timer-danger' };
        const h = Math.floor(d / 3600000);
        const m = Math.floor((d % 3600000) / 60000);
        const s = Math.floor((d % 60000) / 1000);
        const cls = d < 5*60000 ? 'timer-danger' : (d < 15*60000 ? 'timer-warning' : '');
        return { text: `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`, cls };
    }

    // ── Render UI ─────────────────────────────────────────────────────
    function renderUI(units) {
        const container = document.getElementById('unit-grid');
        container.innerHTML = '';

        units.forEach((unit) => {
            const isPlaying   = unit.status === 'Digunakan';
            const isMaint     = unit.status === 'Maintenance';
            const statusColor = isPlaying ? 'text-green-400' : (isMaint ? 'text-yellow-500' : 'text-cyan-400');

            let timerHTML = '<p class="text-lg font-black text-gray-800">--:--:--</p>';
            if (isPlaying && unit.endTime) {
                const { text, cls } = formatSisa(unit.endTime);
                timerHTML = `<p class="text-lg font-black text-white timer-live ${cls}" data-end="${unit.endTime}" data-uid="${unit.id}">${text}</p>`;
            }

            container.innerHTML += `
                <div class="glass-card p-5 border-${(unit.type||'ps3').toLowerCase()}">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-black">${unit.type||'-'} - ${unit.id}</h3>
                            <span class="text-[9px] font-bold uppercase ${statusColor}">${unit.status}</span>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-gray-500 font-bold uppercase">Sisa Waktu</p>
                            ${timerHTML}
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-2 mb-5 py-3 border-y border-white/5">
                        <div class="text-center border-r border-white/5">
                            <p class="text-[8px] text-gray-500 font-bold uppercase">Mulai</p>
                            <p class="text-[11px] font-bold">${unit.startTime||'-'}</p>
                        </div>
                        <div class="text-center border-r border-white/5">
                            <p class="text-[8px] text-gray-500 font-bold uppercase">Customer</p>
                            <p class="text-[11px] font-bold">${unit.customerName||'-'}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[8px] text-gray-500 font-bold uppercase">Harga</p>
                            <p class="text-[11px] font-bold text-green-400">Rp ${(unit.price||0).toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        ${!isPlaying ? `
                            <button onclick="startSesi('${unit.id}','${unit.type}')" class="flex-1 py-3 bg-cyan-400 text-black font-black rounded-xl text-[10px] uppercase">START SESI</button>
                            <button onclick="toggleMaint('${unit.id}','${unit.status}')" class="w-12 h-12 btn-action rounded-xl flex items-center justify-center">
                                <i class="fas fa-tools text-xs ${isMaint ? 'text-cyan-400' : 'text-yellow-500'}"></i>
                            </button>
                        ` : `
                            <button onclick="tambahWaktu('${unit.id}',${unit.endTime},${unit.price})" class="flex-1 py-3 btn-action rounded-xl text-[9px] font-bold">+1 JAM</button>
                            <button onclick="selesaiSesi('${unit.id}')" class="flex-1 py-3 bg-red-500 text-white font-black rounded-xl text-[10px] uppercase">STOP</button>
                        `}
                    </div>
                </div>`;
        });

        // Cek auto-stop
        units.forEach(unit => {
            if (unit.status === 'Digunakan' && unit.endTime && unit.endTime - Date.now() <= 0 && !autoStopped.has(unit.id)) {
                autoStopped.add(unit.id);
                setTimeout(() => autoStopSesi(unit), 500);
            }
        });
    }

    // ── Ticker setiap detik ───────────────────────────────────────────
    function startTicker() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            document.querySelectorAll('.timer-live').forEach(el => {
                const end = parseInt(el.dataset.end);
                const uid = el.dataset.uid;
                if (!end) return;
                const { text, cls } = formatSisa(end);
                el.textContent = text;
                el.className = `text-lg font-black text-white timer-live ${cls}`;
                if (text === 'SELESAI' && !autoStopped.has(uid)) {
                    autoStopped.add(uid);
                    const unit = currentUnits.find(u => u.id === uid);
                    if (unit) autoStopSesi(unit);
                }
            });
        }, 1000);
    }

    // ── Auto-stop ─────────────────────────────────────────────────────
    async function autoStopSesi(unit) {
        try {
            await simpanPendapatan(unit, 'AUTO');
            await resetUnit(unit.id);
        } catch(e) { console.error('autoStop error', e); }
        setTimeout(() => autoStopped.delete(unit.id), 8000);
    }

    // ── Realtime listener ─────────────────────────────────────────────
    onSnapshot(collection(db, 'units'), (snapshot) => {
        currentUnits = [];
        snapshot.forEach(d => currentUnits.push({ id: d.id, ...d.data() }));
        currentUnits.sort((a,b) => a.id.localeCompare(b.id));
        renderUI(currentUnits);
        startTicker();
    });

    // ── Helper: cari pelanggan terdaftar ──────────────────────────────
    async function cariPelanggan(username) {
        if (!username || username.trim() === '') return null;
        try {
            const uDoc = await getDoc(doc(db, 'usernames', username.trim().toLowerCase()));
            if (uDoc.exists()) {
                const uid = uDoc.data().uid;
                const pDoc = await getDoc(doc(db, 'pelanggan', uid));
                if (pDoc.exists()) return { uid, ...pDoc.data() };
            }
            const snap = await getDocs(
                query(collection(db, 'pelanggan'), where('username', '==', username.trim().toLowerCase()))
            );
            if (!snap.empty) return { uid: snap.docs[0].id, ...snap.docs[0].data() };
        } catch(e) { console.error('cariPelanggan error', e); }
        return null;
    }

    // ── Actions ───────────────────────────────────────────────────────
    window.startSesi = async (id, type) => {
        // Step 1: Nama customer (username pelanggan terdaftar atau nama bebas)
        const { value: namaInput, isConfirmed: ok1 } = await Swal.fire({
            title: `START — ${id}`,
            html: `<p style="color:#9ca3af;font-size:11px;margin-bottom:10px">
                     Username pelanggan terdaftar, atau nama tamu langsung
                   </p>`,
            background: '#11171f', color: '#fff',
            input: 'text',
            inputPlaceholder: 'Contoh: budi123 atau Andi',
            inputAttributes: {
                style: 'background:#1a2030;border:1px solid rgba(255,255,255,0.1);color:white;border-radius:8px;padding:10px;font-size:14px;font-family:inherit;text-align:center'
            },
            confirmButtonText: 'Lanjut →',
            confirmButtonColor: '#00d9ff',
            showCancelButton: true,
            cancelButtonColor: '#374151',
            cancelButtonText: 'Batal',
            preConfirm: (v) => {
                if (!v || !v.trim()) { Swal.showValidationMessage('Nama tidak boleh kosong'); return false; }
                return v.trim();
            }
        });
        if (!ok1 || !namaInput) return;

        // Coba match ke akun pelanggan terdaftar
        Swal.fire({ title: 'Mengecek akun...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#11171f', color: '#fff' });
        const pelanggan = await cariPelanggan(namaInput);
        Swal.close();

        const customerName = pelanggan ? (pelanggan.username || namaInput) : namaInput;
        const customerId   = pelanggan ? pelanggan.uid : null;

        // Step 2: Durasi
        const { value: jam, isConfirmed: ok2 } = await Swal.fire({
            title: `Durasi — ${customerName}`,
            html: `<p style="color:#9ca3af;font-size:11px;margin-bottom:8px">
                     ${pelanggan ? '✅ Pelanggan terdaftar' : '👤 Tamu langsung'} &nbsp;·&nbsp; Berapa jam?
                   </p>`,
            background: '#11171f', color: '#fff',
            input: 'number',
            inputPlaceholder: 'Contoh: 2',
            inputAttributes: {
                min: 1, step: 1,
                style: 'background:#1a2030;border:1px solid rgba(255,255,255,0.1);color:white;border-radius:8px;padding:10px;font-size:20px;text-align:center;font-family:inherit'
            },
            confirmButtonText: '▶ MULAI',
            confirmButtonColor: '#00d9ff',
            showCancelButton: true,
            cancelButtonColor: '#374151',
            cancelButtonText: 'Batal',
            preConfirm: (v) => {
                if (!v || v < 1) { Swal.showValidationMessage('Durasi minimal 1 jam'); return false; }
                return parseInt(v);
            }
        });
        if (!ok2 || !jam) return;

        const now     = new Date();
        const endTime = now.getTime() + jam * 3600000;
        const rate    = type === 'PS5' ? 15000 : (type === 'PS4' ? 10000 : 5000);

        await updateDoc(doc(db, 'units', id), {
            status:       'Digunakan',
            startTime:    now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
            endTime,
            price:        jam * rate,
            customerName,
            customerId:   customerId || null
        });
        autoStopped.delete(id);
        tambahNotif(`▶ Sesi Dimulai: ${id} · ${customerName} · ${jam} Jam`);
        Swal.fire({ toast: true, position: 'top', icon: 'success', title: `${id} — ${customerName} · ${jam} Jam`, showConfirmButton: false, timer: 2000, background: '#11171f', color: '#fff' });
    };

    window.selesaiSesi = async (id) => {
        const unit = currentUnits.find(u => u.id === id);
        if (!unit) return;
        const nama = unit.customerName && unit.customerName !== '-' ? unit.customerName : 'Walk-in';
        const { isConfirmed } = await Swal.fire({
            title: 'Stop Sesi?',
            html: `<div style="text-align:center">
                     <p style="font-size:15px;font-weight:800;color:#fff;margin-bottom:6px">${id} — ${nama}</p>
                     <p style="color:#9ca3af;font-size:12px">Rp ${(unit.price||0).toLocaleString('id-ID')} akan dicatat ke pendapatan.</p>
                   </div>`,
            icon: 'warning', showCancelButton: true,
            confirmButtonColor: '#ef4444', cancelButtonColor: '#374151',
            confirmButtonText: '⏹ Ya, STOP', cancelButtonText: 'Batal',
            background: '#11171f', color: '#fff'
        });
        if (isConfirmed) {
            autoStopped.add(id);
            await simpanPendapatan(unit, 'MANUAL');
            await resetUnit(id);
            tambahNotif(`⏹ Sesi Dihentikan: ${id} · ${nama}`);
            setTimeout(() => autoStopped.delete(id), 8000);
        }
    };

    window.tambahWaktu = async (id, currentEnd, currentPrice) => {
        const unit = currentUnits.find(u => u.id === id);
        const rate = unit?.type === 'PS5' ? 15000 : (unit?.type === 'PS4' ? 10000 : 5000);
        await updateDoc(doc(db,'units',id), { endTime: currentEnd + 3600000, price: currentPrice + rate });
        tambahNotif(`\u23F1 Tambah Waktu: ${id} (+1 Jam)`);
        Swal.fire({ toast:true, position:'top', icon:'success', title:'+1 Jam Ditambahkan', showConfirmButton:false, timer:1500 });
    };

    window.toggleMaint = async (id, currentStatus) => {
        await updateDoc(doc(db,'units',id), {
            status: currentStatus === 'Maintenance' ? 'Tersedia' : 'Maintenance'
        });
    };

    // ── Notifikasi ────────────────────────────────────────────────────
    function tambahNotif(pesan) {
        const waktu = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
        historyNotif.unshift({ pesan, waktu });
        document.getElementById('notif-dot').classList.remove('hidden');
        updateNotifList();
    }
    function updateNotifList() {
        const list = document.getElementById('notif-list');
        list.innerHTML = historyNotif.length ? '' : '<p class="text-center text-gray-600 py-4">Belum ada aktivitas.</p>';
        historyNotif.forEach((item, i) => {
            list.innerHTML += `
                <div class="notif-item flex justify-between items-start bg-white/5 p-3 rounded-xl">
                    <div><p class="font-bold text-gray-300">${item.pesan}</p><span class="text-[9px] text-gray-500 uppercase">${item.waktu}</span></div>
                    <button onclick="hapusNotifSatuan(${i})" class="text-gray-600 hover:text-red-500"><i class="fas fa-times"></i></button>
                </div>`;
        });

        html +=       '<i class="fas ' + icon + '" style="color:' + (isBooking ? '#00d9ff' : '#a855f7') + '"></i>';

        html +=       '<p class="text-[10px] text-gray-500">' + waktu + '</p>';

        html +=     '<span class="badge-pending">Menunggu</span>';

        html +=   '<div class="flex justify-between text-xs"><span class="text-gray-500">Total</span><span class="font-black text-cyan-400">' + fmtRupiah(item.grandTotal || item.total) + '</span></div>';

    // ── Suara notifikasi (Web Audio API, tanpa file eksternal) ────────
    function bunyiNotif(tipe) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const seqs = tipe === 'booking'
                ? [[520,80],[660,80],[780,120]]          // booking: naik cepat — sinyal aktif
                : [[440,100],[370,100],[440,60],[560,160]]; // rental: turun-naik — sinyal "bawa pulang"
            let t = ctx.currentTime + 0.05;
            seqs.forEach(([freq, dur]) => {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = freq;
                o.type = tipe === 'booking' ? 'sine' : 'triangle';
                g.gain.setValueAtTime(0.4, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur / 1000);
                o.start(t); o.stop(t + dur / 1000);
                t += dur / 1000 + 0.03;
            });
        } catch(e) {}
    }

    // Set untuk track ID yang sudah diketahui (hindari notif saat pertama load)
    var knownBookingIds = null; // null = belum inisialisasi
    var knownRentalIds  = null;

    // Listen bookings pending
    onSnapshot(
        query(collection(db, 'bookings'), where('status', '==', 'Menunggu Konfirmasi Staff')),
        function(snap) {
            var bookings = snap.docs.map(function(d) { return Object.assign({ id: d.id, _col: 'bookings' }, d.data()); });
            var currentIds = new Set(bookings.map(function(b) { return b.id; }));

            if (knownBookingIds === null) {
                // Pertama kali load: inisialisasi tanpa notif
                knownBookingIds = currentIds;
            } else {
                // Cek ID baru yang belum diketahui
                bookings.forEach(function(b) {
                    if (!knownBookingIds.has(b.id)) {
                        knownBookingIds.add(b.id);
                        bunyiNotif('booking');
                        tambahNotif('🎮 Booking baru: ' + (b.customerName || b.custName || 'Pelanggan') + ' — ' + (b.console || '-') + ' ' + (b.duration || '?') + ' Jam');
                        popupPesananBaru(b);
                    }
                });
            }

            pendingItems = pendingItems.filter(function(p) { return p._col !== 'bookings'; }).concat(bookings);
            pendingItems.sort(function(a, b) { return (a.createdAt || '') > (b.createdAt || '') ? -1 : 1; });
            updateReqList();
        }
    );

    // Listen rentals pending
    onSnapshot(
        query(collection(db, 'rentals'), where('status', '==', 'Menunggu Konfirmasi Staff')),
        function(snap) {
            var rentals = snap.docs.map(function(d) { return Object.assign({ id: d.id, _col: 'rentals' }, d.data()); });
            var currentIds = new Set(rentals.map(function(r) { return r.id; }));

            if (knownRentalIds === null) {
                knownRentalIds = currentIds;
            } else {
                rentals.forEach(function(r) {
                    if (!knownRentalIds.has(r.id)) {
                        knownRentalIds.add(r.id);
                        bunyiNotif('rental');
                        tambahNotif('📦 Rental baru: ' + (r.customerName || r.custName || 'Pelanggan') + ' — ' + (r.console || '-') + ' ' + (r.duration || '?') + ' Jam');
                        popupPesananBaru(r);
                    }
                });
            }

            pendingItems = pendingItems.filter(function(p) { return p._col !== 'rentals'; }).concat(rentals);
            pendingItems.sort(function(a, b) { return (a.createdAt || '') > (b.createdAt || '') ? -1 : 1; });
            updateReqList();
        }
    );

    // ── SETUJUI ────────────────────────────────────────────────────────
    window.setujuiPermintaan = async function(col, docId, paymentMethod, custName) {
        // Ambil data lengkap item ini dari pendingItems
        var item = pendingItems.find(function(p) { return p.id === docId && p._col === col; });
        var isBooking = col === 'bookings';
        var isEwallet = (paymentMethod || '').toLowerCase().includes('ewallet') || (paymentMethod || '').toLowerCase().includes('dana');
        var newStatus = isEwallet ? 'Aktif' : 'Menunggu Pembayaran';

        // Resolusi nama pelanggan terbaik: dari Firestore pelanggan, fallback customerName booking
        var resolvedName = custName;
        if (item && item.userId) {
            try {
                var pDoc = await getDoc(doc(db, 'pelanggan', item.userId));
                if (pDoc.exists() && pDoc.data().username) resolvedName = pDoc.data().username;
            } catch(e) {}
        }

        var res = await Swal.fire({
            title: isBooking ? 'Konfirmasi Booking?' : '📦 Konfirmasi Rental Bawa Pulang?',
            html: function() {
                if (isBooking) {
                    return 'Setujui permintaan dari <strong>' + resolvedName + '</strong>?<br><br>' +
                        'Unit <strong>' + (item && item.console ? item.console : '-') + '</strong> akan otomatis diaktifkan.' +
                        '<br>Status: <strong style="color:#10b981">' + newStatus + '</strong>';
                } else {
                    // Rental bawa pulang: tampilkan info lengkap
                    var startStr = item && item.startTime ? new Date(item.startTime).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '-';
                    var endStr   = item && item.endTime   ? new Date(item.endTime).toLocaleString('id-ID',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '-';
                    var addr     = (item && item.customerAddress) ? item.customerAddress : '-';
                    var phone    = (item && item.customerPhone)   ? item.customerPhone   : '-';
                    var dur      = item ? (item.duration || '?') : '?';
                    var cons     = item ? (item.console  || '-') : '-';
                    var total    = item ? (item.grandTotal || item.total || 0) : 0;
                    return '<div style="text-align:left;font-size:12px;line-height:2">' +
                        '<div style="display:flex;justify-content:space-between"><span style="color:#9ca3af">Pelanggan</span><strong style="color:#fff">' + resolvedName + '</strong></div>' +
                        '<div style="display:flex;justify-content:space-between"><span style="color:#9ca3af">Konsol</span><strong style="color:#fff">' + cons + ' · ' + dur + ' Jam</strong></div>' +
                        '<div style="display:flex;justify-content:space-between"><span style="color:#9ca3af">Mulai</span><strong style="color:#fff">' + startStr + '</strong></div>' +
                        '<div style="display:flex;justify-content:space-between"><span style="color:#9ca3af">Batas kembali</span><strong style="color:#f59e0b">' + endStr + '</strong></div>' +
                        '<div style="display:flex;justify-content:space-between"><span style="color:#9ca3af">Alamat</span><strong style="color:#fff;max-width:60%;text-align:right">' + addr + '</strong></div>' +
                        '<div style="display:flex;justify-content:space-between"><span style="color:#9ca3af">WhatsApp</span><strong style="color:#4ade80">' + phone + '</strong></div>' +
                        '<div style="display:flex;justify-content:space-between"><span style="color:#9ca3af">Total</span><strong style="color:#00d9ff">Rp ' + total.toLocaleString('id-ID') + '</strong></div>' +
                        '</div>' +
                        '<div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:10px;margin-top:12px;font-size:11px;color:#f59e0b;text-align:center">' +
                        '<i class="fas fa-triangle-exclamation" style="margin-right:6px"></i>' +
                        'Pastikan konsol sudah disiapkan & pelanggan sudah dihubungi sebelum menyetujui.' +
                        '</div>';
                }
            }(),
            showCancelButton: true,
            confirmButtonText: isBooking ? '✓ Setujui & Aktifkan' : '📦 Setujui Rental',
            cancelButtonText: 'Batal',
            confirmButtonColor: isBooking ? '#10b981' : '#a855f7',
            cancelButtonColor: '#374151',
            background: '#11171f', color: '#fff'
        });
        if (!res.isConfirmed) return;

        Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#11171f', color: '#fff' });

        try {
            var confirmedAt = new Date().toISOString();
            var assignedUnitId = null;

            // ── Jika booking: cari & aktifkan unit yang tersedia ──────────
            if (isBooking && item && item.console) {
                var consoleType = item.console; // 'PS3' / 'PS4' / 'PS5'
                var duration    = item.duration || 1;
                var rate        = consoleType === 'PS5' ? 15000 : (consoleType === 'PS4' ? 10000 : 5000);

                // Cari unit tersedia bertipe sama, urutkan by id
                var unitSnap = await getDocs(
                    query(collection(db, 'units'),
                        where('type',   '==', consoleType),
                        where('status', '==', 'Tersedia')
                    )
                );

                if (unitSnap.empty) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Unit Penuh!',
                        html: 'Semua unit <strong>' + consoleType + '</strong> sedang digunakan.<br><span style="color:#9ca3af;font-size:12px">Tolak atau tunggu hingga ada unit tersedia.</span>',
                        background: '#11171f', color: '#fff'
                    });
                    return;
                }

                // Ambil unit pertama yang tersedia
                var unitDoc  = unitSnap.docs[0];
                assignedUnitId = unitDoc.id;

                // Tentukan waktu mulai & selesai berdasar jadwal booking
                var now = new Date();
                // Gunakan jam booking jika sudah set, fallback ke sekarang
                var startMoment = now;
                if (item.date && item.time) {
                    var parsed = new Date(item.date + 'T' + item.time);
                    if (!isNaN(parsed)) startMoment = parsed;
                }
                var endTime   = startMoment.getTime() + duration * 3600000;
                var startStr  = startMoment.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                // Update unit → Digunakan (realtime ke staff & owner)
                await updateDoc(doc(db, 'units', assignedUnitId), {
                    status:       'Digunakan',
                    startTime:    startStr,
                    endTime:      endTime,
                    price:        duration * rate,
                    customerName: resolvedName,
                    customerId:   item.userId || null,
                    bookingId:    docId
                });

                // Catat juga assignedUnit ke booking agar bisa di-track
                await updateDoc(doc(db, col, docId), {
                    status:        newStatus,
                    confirmedAt,
                    confirmedBy:   'staff',
                    assignedUnit:  assignedUnitId,
                    customerName:  resolvedName
                });

                tambahNotif('✅ Disetujui: ' + resolvedName + ' → Unit ' + assignedUnitId + ' aktif (' + consoleType + ' · ' + duration + ' Jam)');

            } else {
                // Rental bawa pulang: update status + catat staff yang approve
                var rentalStatus = 'Aktif'; // rental bawa pulang langsung aktif setelah disetujui
                await updateDoc(doc(db, col, docId), {
                    status:          rentalStatus,
                    confirmedAt,
                    confirmedBy:     'staff',
                    customerName:    resolvedName
                });
                var endStr = item && item.endTime ? new Date(item.endTime).toLocaleString('id-ID',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '-';
                tambahNotif('📦 Rental Disetujui: ' + resolvedName + ' — ' + (item ? (item.console||'-') + ' ' + (item.duration||'?') + ' Jam' : '') + ' · Kembali: ' + endStr);
            }

            Swal.fire({
                toast: true, position: 'top', icon: 'success',
                title: isBooking && assignedUnitId
                    ? '✅ ' + resolvedName + ' → Unit ' + assignedUnitId + ' aktif!'
                    : '📦 Rental ' + resolvedName + ' disetujui!',
                showConfirmButton: false, timer: 3500, background: '#11171f', color: '#fff'
            });

        } catch(e) {
            Swal.fire({ icon: 'error', title: 'Gagal', text: e.message, background: '#11171f', color: '#fff' });
        }
    };

    // ── TOLAK ──────────────────────────────────────────────────────────
    window.tolakPermintaan = async function(col, id, custName) {
        var res = await Swal.fire({
            title: 'Tolak Permintaan?',
            html: 'Tolak permintaan dari <strong>' + custName + '</strong>?<br><span style="color:#9ca3af;font-size:12px">Pastikan sudah menghubungi pelanggan terlebih dahulu.</span>',
            icon: 'warning',
            input: 'text',
            inputPlaceholder: 'Alasan penolakan (opsional)',
            showCancelButton: true,
            confirmButtonText: '✕ Tolak',
            cancelButtonText: 'Batal',
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#374151',
            background: '#11171f', color: '#fff',
            inputAttributes: { style: 'background:#1a2030;border:1px solid rgba(255,255,255,0.1);color:white;border-radius:8px;padding:10px;font-size:13px;' }
        });
        if (!res.isConfirmed) return;

        try {
            await updateDoc(doc(db, col, id), {
                status: 'Ditolak',
                rejectedAt: new Date().toISOString(),
                rejectedBy: 'staff',
                rejectionReason: res.value || 'Tidak ada alasan'
            });
            Swal.fire({ toast: true, position: 'top', icon: 'info', title: 'Permintaan ditolak', showConfirmButton: false, timer: 2000, background: '#11171f', color: '#fff' });
            tambahNotif('❌ Ditolak: ' + custName + ' (' + (col === 'bookings' ? 'Booking' : 'Rental') + ') — ' + (res.value || '-'));
        } catch(e) {
            Swal.fire({ icon: 'error', title: 'Gagal', text: e.message, background: '#11171f', color: '#fff' });
        }
    };

</script>
</body>
</html>
