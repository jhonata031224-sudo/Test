<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Games - Book a Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background-color: #06090f; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(17, 23, 31, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .progress-bar { height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; flex: 1; }
        .progress-active { background: #00d9ff; box-shadow: 0 0 10px #00d9ff; }
        .console-card { border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; cursor: pointer; }
        .console-active { border-color: #00d9ff; background: rgba(0, 217, 255, 0.05); box-shadow: 0 0 15px rgba(0, 217, 255, 0.1); }
        .btn-cyan { background: #00d9ff; color: #000; font-weight: 800; box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); }
        input { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus { border-color: #00d9ff !important; outline: none; }
        .cat-btn { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .cat-active { background: #00d9ff; color: #000; border-color: #00d9ff; }
        .cat-inactive { color: #9ca3af; background: rgba(255,255,255,0.03); }
        .menu-item { border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; transition: 0.2s; }
        .menu-item:hover { border-color: rgba(0,217,255,0.2); }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; transition: 0.15s; cursor: pointer; }
        .qty-minus { background: rgba(255,255,255,0.1); color: white; }
        .qty-minus:hover { background: rgba(255,255,255,0.2); }
        .qty-plus { background: #00d9ff; color: #000; }
        .qty-plus:hover { box-shadow: 0 0 12px rgba(0,217,255,0.4); }
        .tambah-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 6px 14px; font-size: 11px; font-weight: 700; color: #9ca3af; transition: 0.2s; cursor: pointer; }
        .tambah-btn:hover { border-color: rgba(0,217,255,0.4); color: #00d9ff; }
        .subtotal-bar { background: rgba(17,23,31,0.97); border: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6">

<div class="max-w-xl mx-auto">
    <h1 class="text-3xl font-black mb-2 tracking-tighter">Booking sesi</h1>
    <p id="step-label" class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-6">Step 1 of 4</p>

    <div class="flex gap-2 mb-10">
        <div id="p1" class="progress-bar progress-active"></div>
        <div id="p2" class="progress-bar"></div>
        <div id="p3" class="progress-bar"></div>
        <div id="p4" class="progress-bar"></div>
    </div>

    <!-- STEP 1: PILIH KONSOL & WAKTU -->
    <div id="step1" class="space-y-8">
        <div>
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-4">Choose console</label>
            <div class="grid grid-cols-3 gap-3">
                <div onclick="selectConsole('PS3', 5000, this)" class="console-card p-4 rounded-xl text-center">
                    <p class="font-bold text-sm">PS3</p><p class="text-[10px] text-gray-500">Rp 5k/h</p>
                </div>
                <div onclick="selectConsole('PS4', 10000, this)" class="console-card p-4 rounded-xl text-center console-active">
                    <p class="font-bold text-sm">PS4</p><p class="text-[10px] text-gray-500">Rp 10k/h</p>
                </div>
                <div onclick="selectConsole('PS5', 15000, this)" class="console-card p-4 rounded-xl text-center">
                    <p class="font-bold text-sm">PS5</p><p class="text-[10px] text-gray-500">Rp 15k/h</p>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">Date</label>
                <input type="date" id="book-date" class="w-full p-4 rounded-xl text-sm">
            </div>
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">Time</label>
                <input type="time" id="book-time" class="w-full p-4 rounded-xl text-sm">
            </div>
        </div>
        <div>
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-4">Duration</label>
            <div class="grid grid-cols-4 gap-2">
                <button onclick="setDuration(1, this)" class="py-3 rounded-xl bg-white/5 border border-white/10 text-xs hover:border-cyan-400">1h</button>
                <button onclick="setDuration(2, this)" class="py-3 rounded-xl bg-white/5 border border-white/10 text-xs hover:border-cyan-400">2h</button>
                <button onclick="setDuration(3, this)" class="py-3 rounded-xl bg-white/5 border border-white/10 text-xs hover:border-cyan-400">3h</button>
                <button onclick="setDuration(5, this)" class="py-3 rounded-xl btn-cyan text-xs">5h</button>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="location.href='dashboard-customer.html'" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-2xl uppercase text-xs font-bold">Back</button>
            <button onclick="goToStep(2)" class="flex-[2] btn-cyan py-5 rounded-2xl uppercase tracking-widest text-sm font-black">Continue <i class="fas fa-arrow-right ml-2"></i></button>
        </div>
    </div>

    <!-- STEP 2: PRE-ORDER F&B -->
    <div id="step2" class="hidden">
        <div class="flex justify-between items-center mb-5">
            <div class="flex items-center gap-2">
                <i class="fas fa-utensils text-cyan-400 text-sm"></i>
                <span class="text-sm font-black uppercase tracking-widest">Pre-order makanan & minuman</span>
            </div>
            <span class="text-[10px] text-gray-500 font-bold uppercase">Opsional</span>
        </div>

        <div id="cat-tabs" class="flex gap-2 mb-5 flex-wrap"></div>

        <div id="menu-list" class="space-y-3 mb-4">
            <div class="text-center py-10 text-gray-600 text-sm">
                <i class="fas fa-spinner fa-spin text-cyan-400 text-xl mb-3 block"></i>
                Memuat menu...
            </div>
        </div>

        <div class="subtotal-bar rounded-2xl p-4 flex justify-between items-center mb-6">
            <span class="text-xs text-gray-400 font-bold" id="subtotal-label">Subtotal F&B (0 item)</span>
            <span class="font-black text-white tracking-tight" id="subtotal-val">Rp 0</span>
        </div>

        <div class="flex gap-3">
            <button onclick="goToStep(1)" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-2xl uppercase text-xs font-bold">Kembali</button>
            <button onclick="goToStep(3)" class="flex-[2] btn-cyan py-5 rounded-2xl uppercase text-xs font-black">Lanjut <i class="fas fa-arrow-right ml-2"></i></button>
        </div>
    </div>

    <!-- STEP 3: DATA DIRI -->
    <div id="step3" class="hidden space-y-8">
        <div>
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">Full name</label>
            <input type="text" id="cust-name" placeholder="Masukkan nama anda" class="w-full p-4 rounded-xl text-sm">
        </div>
        <div>
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">Phone (WhatsApp)</label>
            <input type="number" id="cust-phone" placeholder="08..." class="w-full p-4 rounded-xl text-sm">
        </div>
        <div class="flex gap-3">
            <button onclick="goToStep(2)" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-2xl uppercase text-xs font-bold">Back</button>
            <button onclick="goToStep(4)" class="flex-[2] btn-cyan py-5 rounded-2xl uppercase text-xs font-black">Continue <i class="fas fa-arrow-right ml-2"></i></button>
        </div>
    </div>

    <!-- STEP 4: KONFIRMASI -->
    <div id="step4" class="hidden space-y-8">
        <div class="glass-card p-6 rounded-3xl space-y-4 text-sm">
            <div class="flex justify-between"><span class="text-gray-500">Console</span><span id="res-console" class="font-bold">PS4</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Duration</span><span id="res-duration" class="font-bold">5h</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Customer</span><span id="res-name" class="font-bold">-</span></div>
            <div id="res-fnb-wrap" class="hidden">
                <div class="h-px bg-white/5 my-2"></div>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Pre-order F&B</p>
                <div id="res-fnb-list" class="space-y-1 text-xs"></div>
                <div class="flex justify-between mt-2 text-xs">
                    <span class="text-gray-500">Subtotal F&B</span>
                    <span id="res-fnb-subtotal" class="font-bold text-cyan-400"></span>
                </div>
            </div>
            <div class="h-px bg-white/5 my-4"></div>
            <div class="flex justify-between items-center">
                <span class="font-bold uppercase tracking-widest text-[10px]">Total Payment</span>
                <span id="res-total" class="text-xl font-black text-cyan-400 tracking-tighter">Rp 0</span>
            </div>
        </div>

        <!-- Metode pembayaran dipilih di halaman payment.html -->
        <div class="flex gap-3">
            <button onclick="goToStep(3)" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-2xl uppercase text-xs font-bold">Back</button>
            <button onclick="confirmBooking()" class="flex-[2] btn-cyan py-5 rounded-2xl uppercase text-xs font-black">
                <i class="fas fa-credit-card mr-2"></i> Pilih Pembayaran
            </button>
        </div>
    </div>

    <!-- Redirect ke payment.html setelah step 4 -->

</div>

<script type="module">
    import { db, auth, collection, onSnapshot, addDoc } from './auth.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    window.selectConsole  = selectConsole;
    window.setDuration    = setDuration;
    window.goToStep       = goToStep;
    window.confirmBooking = confirmBooking;
    window.filterMenu     = filterMenu;
    window.changeQty      = changeQty;

    // ── AUTH ──
    let currentUser = null;
    onAuthStateChanged(auth, user => {
        if (!user) { window.location.href = 'login-pelanggan.html'; return; }
        currentUser = user;
    });

    // ── Cek ketersediaan unit ──
    async function checkUnitAvailable(consoleType) {
        const snap = await getDocs(query(collection(db, 'units'),
            where('type', '==', consoleType),
            where('status', '==', 'Tersedia')
        ));
        return snap.size; // jumlah unit tersedia
    }

    let bookingData = { console: 'PS4', rate: 10000, duration: 5, payment: 'Ewallet' };
    let allMenuItems = [];
    let cart = {};
    let currentFilter = 'Semua';

    const now = new Date();
    document.getElementById('book-date').valueAsDate = now;
    document.getElementById('book-time').value =
        now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    // Fetch menu real-time dari Firestore (collection 'menus')
    onSnapshot(collection(db, 'menus'), (snap) => {
        allMenuItems = [];
        snap.forEach(d => allMenuItems.push({ id: d.id, ...d.data() }));
        buildCategoryTabs();
        renderMenuList(currentFilter);
    });

    function selectConsole(name, price, el) {
        bookingData.console = name;
        bookingData.rate    = price;
        document.querySelectorAll('.console-card').forEach(c => c.classList.remove('console-active'));
        el.classList.add('console-active');
    }

    function setDuration(h, el) {
        bookingData.duration = h;
        document.querySelectorAll('#step1 button').forEach(b => {
            if (b.innerText.includes('h'))
                b.className = "py-3 rounded-xl bg-white/5 border border-white/10 text-xs hover:border-cyan-400";
        });
        el.className = "py-3 rounded-xl btn-cyan text-xs";
    }


    function buildCategoryTabs() {
        const cats = ['Semua', ...new Set(allMenuItems.map(m => m.category).filter(Boolean))];
        const wrap = document.getElementById('cat-tabs');
        wrap.innerHTML = '';
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn ' + (cat === currentFilter ? 'cat-active' : 'cat-inactive');
            btn.textContent = cat;
            btn.onclick = () => filterMenu(cat, btn);
            wrap.appendChild(btn);
        });
    }

    function filterMenu(cat, el) {
        currentFilter = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn cat-inactive');
        el.className = 'cat-btn cat-active';
        renderMenuList(cat);
    }

    function getEmoji(item) {
        if (item.emoji) return item.emoji;
        const map = { 'Makanan': '🍜', 'Food': '🍜', 'Minuman': '🥤', 'Drink': '🥤', 'Snack': '🍟' };
        return map[item.category] || '🛒';
    }

    function renderMenuList(filter) {
        const list = document.getElementById('menu-list');
        const filtered = filter === 'Semua' ? allMenuItems : allMenuItems.filter(m => m.category === filter);

        if (filtered.length === 0) {
            list.innerHTML = '<div class="text-center py-10 text-gray-600 text-sm"><i class="fas fa-box-open text-2xl mb-3 block text-gray-700"></i>Menu tidak tersedia</div>';
            return;
        }

        list.innerHTML = '';
        filtered.forEach(item => {
            const qty = cart[item.id] || 0;
            const div = document.createElement('div');
            div.id = 'menu-row-' + item.id;
            div.className = 'menu-item p-4 flex items-center gap-3 bg-white/[0.02]';
            div.innerHTML =
                '<div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" style="background:rgba(0,217,255,0.07)">' +
                    getEmoji(item) +
                '</div>' +
                '<div class="flex-1 min-w-0">' +
                    '<p class="font-bold text-sm leading-tight">' + item.name + '</p>' +
                    '<p class="text-[11px] text-cyan-400 font-bold mt-0.5">Rp ' + parseInt(item.price).toLocaleString('id-ID') + '</p>' +
                '</div>' +
                '<div id="ctrl-' + item.id + '" class="flex-shrink-0">' + renderCtrl(item.id, qty) + '</div>';
            list.appendChild(div);
        });
    }

    function renderCtrl(id, qty) {
        if (qty === 0) {
            return '<button class="tambah-btn" onclick="changeQty(\'' + id + '\', 1)"><i class="fas fa-plus mr-1 text-[9px]"></i> Tambah</button>';
        }
        return '<div class="flex items-center gap-2">' +
            '<div class="qty-btn qty-minus" onclick="changeQty(\'' + id + '\', -1)">−</div>' +
            '<span class="font-black text-sm w-5 text-center">' + qty + '</span>' +
            '<div class="qty-btn qty-plus" onclick="changeQty(\'' + id + '\', 1)">+</div>' +
        '</div>';
    }

    function changeQty(id, delta) {
        const prev = cart[id] || 0;
        const next = prev + delta;
        if (next <= 0) { delete cart[id]; } else { cart[id] = next; }
        const ctrl = document.getElementById('ctrl-' + id);
        if (ctrl) ctrl.innerHTML = renderCtrl(id, cart[id] || 0);
        updateSubtotal();
    }

    function updateSubtotal() {
        let total = 0, count = 0;
        for (const [id, qty] of Object.entries(cart)) {
            const item = allMenuItems.find(m => m.id === id);
            if (item) { total += item.price * qty; count += qty; }
        }
        document.getElementById('subtotal-label').textContent = 'Subtotal F&B (' + count + ' item)';
        document.getElementById('subtotal-val').textContent = 'Rp ' + total.toLocaleString('id-ID');
    }

    function calcFnbTotal() {
        return Object.entries(cart).reduce((sum, [id, qty]) => {
            const item = allMenuItems.find(m => m.id === id);
            return sum + (item ? item.price * qty : 0);
        }, 0);
    }

    function goToStep(s) {
        if (s === 4) {
            const name = document.getElementById('cust-name').value.trim();
            if (!name) {
                Swal.fire({ icon:'warning', title:'Nama kosong', text:'Masukkan nama lengkap Anda.', background:'#11171f', color:'#fff', confirmButtonColor:'#00d9ff' });
                return;
            }
        }

        ['step1','step2','step3','step4'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById('step' + s).classList.remove('hidden');
        document.getElementById('step-label').innerText = 'Step ' + s + ' of 4';
        ['p1','p2','p3','p4'].forEach((id, idx) => {
            document.getElementById(id).className = idx < s ? 'progress-bar progress-active' : 'progress-bar';
        });

        if (s === 4) {
            const sessionTotal = bookingData.rate * bookingData.duration;
            const fnbTotal     = calcFnbTotal();
            document.getElementById('res-console').innerText  = bookingData.console;
            document.getElementById('res-duration').innerText = bookingData.duration + ' Jam';
            document.getElementById('res-name').innerText     = document.getElementById('cust-name').value || 'Guest';
            document.getElementById('res-total').innerText    = 'Rp ' + (sessionTotal + fnbTotal).toLocaleString('id-ID');

            const fnbWrap = document.getElementById('res-fnb-wrap');
            const fnbList = document.getElementById('res-fnb-list');
            if (Object.keys(cart).length > 0) {
                fnbWrap.classList.remove('hidden');
                fnbList.innerHTML = '';
                for (const [id, qty] of Object.entries(cart)) {
                    const item = allMenuItems.find(m => m.id === id);
                    if (!item) continue;
                    fnbList.innerHTML += '<div class="flex justify-between text-gray-300"><span>' + item.name + ' x' + qty + '</span><span>Rp ' + (item.price * qty).toLocaleString('id-ID') + '</span></div>';
                }
                document.getElementById('res-fnb-subtotal').innerText = 'Rp ' + fnbTotal.toLocaleString('id-ID');
            } else {
                fnbWrap.classList.add('hidden');
            }
        }
    }

    async function confirmBooking() {
        const custName  = document.getElementById('cust-name').value || 'Customer';
        const custPhone = document.getElementById('cust-phone').value || '—';
        const bookDate  = document.getElementById('book-date').value;
        const bookTime  = document.getElementById('book-time').value;
        const duration  = bookingData.duration;

        // Validasi: pastikan tanggal & jam diisi
        if (!bookDate || !bookTime) {
            Swal.fire({ icon:'warning', title:'Tanggal/Jam belum diisi', text:'Harap isi tanggal dan jam booking.', background:'#11171f', color:'#fff', confirmButtonColor:'#00d9ff' });
            return;
        }

        // Validasi booking masa lalu
        const bookDt = new Date(`${bookDate}T${bookTime}`);
        if (bookDt < new Date()) {
            Swal.fire({ icon:'warning', title:'Waktu sudah lewat', text:'Pilih tanggal/jam yang belum berlalu.', background:'#11171f', color:'#fff', confirmButtonColor:'#00d9ff' });
            return;
        }

        // ── Cek ketersediaan unit ──
        Swal.fire({ title:'Mengecek ketersediaan unit...', allowOutsideClick:false, didOpen:()=>Swal.showLoading(), background:'#11171f', color:'#fff' });
        const available = await checkUnitAvailable(bookingData.console);
        Swal.close();
        if (available === 0) {
            Swal.fire({
                icon: 'error',
                title: 'Unit ' + bookingData.console + ' Penuh!',
                html: 'Semua unit <strong>' + bookingData.console + '</strong> sedang digunakan saat ini.<br><br>Silakan pilih tipe konsol lain atau coba lagi nanti.',
                background:'#11171f', color:'#fff', confirmButtonColor:'#00d9ff',
                confirmButtonText:'Pilih Konsol Lain',
                footer: '<span style="color:#6b7280;font-size:11px">PS3: 12 unit · PS4: 3 unit · PS5: 1 unit</span>'
            });
            goToStep(1);
            return;
        }

        const fnbOrders = Object.entries(cart).map(([id, qty]) => {
            const item = allMenuItems.find(m => m.id === id);
            return item ? { id, name: item.name, price: item.price, qty, subtotal: item.price * qty } : null;
        }).filter(Boolean);

        const fnbTotal   = calcFnbTotal();
        const grandTotal = bookingData.rate * duration + fnbTotal;

        // Simpan data ke sessionStorage → lanjut ke payment.html
        const pendingBooking = {
            console   : bookingData.console,
            rate      : bookingData.rate,
            duration  : duration,
            date      : bookDate,
            time      : bookTime,
            custName  : custName,
            custPhone : custPhone,
            fnbOrders : fnbOrders,
            fnbTotal  : fnbTotal,
            grandTotal: grandTotal,
            userId    : currentUser ? currentUser.uid : null,
            userEmail : currentUser ? currentUser.email : null
        };
        sessionStorage.setItem('pendingBooking', JSON.stringify(pendingBooking));
        location.href = 'payment-booking.html';
    }
</script>
</body>
</html>
